services:
  xray-panel:
    build: .
    ports:
      - 12017:2017
      - 10808:10808
      - 10809:10809
    image: xray-panel:local
    container_name: xray-panel
    restart: always
    network_mode: host          # 面板:2017 / SOCKS:10808 / HTTP:10809 直接落宿主机
    environment:
      - PANEL_DATA_DIR=/data/xray
      - PANEL_PORT=2017
      # 不设则首次启动随机生成密码(见 docker compose logs);要固定就取消下行注释:
      - PANEL_PASSWORD=123321123
      # 订阅默认拒绝解析到内网/保留地址(防 SSRF)。若订阅服务器在内网,
      # 或本机用 fake-ip 代理把域名解析到 198.18/16,取消下行注释放行:
      - SUBSCRIPTION_ALLOW_INTERNAL=1
    volumes:
      - ./data:/data/xray    # 持久化 panel.json / config.json
